apiVersion: v1
kind: Secret
metadata:
  name: ssh-codebuddy-secret
type: Opaque
stringData:
  SSH_PASSWORD: "change-me"
  # CODEBUDDY_API_KEY: "your-api-key"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ssh-codebuddy-home-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-codebuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-codebuddy
  template:
    metadata:
      labels:
        app: ssh-codebuddy
    spec:
      containers:
        - name: ssh-codebuddy
          image: registry.windo.me/tools/ssh-codebuddy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 22
              name: ssh
            - containerPort: 10532
              name: api
          env:
            - name: SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ssh-codebuddy-secret
                  key: SSH_PASSWORD
            # - name: CODEBUDDY_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: ssh-codebuddy-secret
            #       key: CODEBUDDY_API_KEY
            - name: CODEBUDDY_GATEWAY_ENABLED
              value: "true"
          volumeMounts:
            - name: codebuddy-home
              mountPath: /home/codebuddy
      volumes:
        - name: codebuddy-home
          persistentVolumeClaim:
            claimName: ssh-codebuddy-home-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-codebuddy
spec:
  type: ClusterIP
  selector:
    app: ssh-codebuddy
  ports:
    - name: ssh
      port: 22
      targetPort: 22
    - name: api
      port: 10532
      targetPort: 10532
