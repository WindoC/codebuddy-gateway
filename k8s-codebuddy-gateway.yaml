apiVersion: v1
kind: Secret
metadata:
  name: codebuddy-gateway-secret
type: Opaque
stringData:
  SSH_PASSWORD: "change-me"
  # CODEBUDDY_API_KEY: "your-api-key"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codebuddy-gateway-home-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebuddy-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codebuddy-gateway
  template:
    metadata:
      labels:
        app: codebuddy-gateway
    spec:
      containers:
        - name: codebuddy-gateway
          image: registry.windo.me/tools/codebuddy-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 22
              name: ssh
            - containerPort: 10532
              name: api
          env:
            - name: SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codebuddy-gateway-secret
                  key: SSH_PASSWORD
            # - name: CODEBUDDY_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: codebuddy-gateway-secret
            #       key: CODEBUDDY_API_KEY
            - name: CODEBUDDY_GATEWAY_ENABLED
              value: "true"
            # Built-in CodeBuddy tools are disabled by default for REST API calls.
            # API callers can still pass OpenAI-style `tools`; those are returned
            # as tool_calls for the caller to execute externally.
            # - name: CODEBUDDY_GATEWAY_TOOLS
            #   value: ""
            # - name: CODEBUDDY_GATEWAY_DISALLOWED_TOOLS
            #   value: "Bash(git commit),Bash(git push),Bash(rm),Bash(sudo)"
            # - name: CODEBUDDY_GATEWAY_MODEL
            #   value: "glm-5.2"
            # - name: CODEBUDDY_GATEWAY_MAX_TURNS
            #   value: "30"
            # - name: CODEBUDDY_GATEWAY_TIMEOUT
            #   value: "300000"
          volumeMounts:
            - name: codebuddy-home
              mountPath: /home/codebuddy
      volumes:
        - name: codebuddy-home
          persistentVolumeClaim:
            claimName: codebuddy-gateway-home-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: codebuddy-gateway
spec:
  type: ClusterIP
  selector:
    app: codebuddy-gateway
  ports:
    - name: ssh
      port: 22
      targetPort: 22
    - name: api
      port: 10532
      targetPort: 10532
